<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stallion Metallist - Industrial Sustainability</title>
    <link rel="icon" type="image/png" href="/brand/Stallion logo with transparent bg.png" />
    <style>
      body { margin: 0; }
    </style>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme') || 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          if (theme === 'light') {
            document.documentElement.style.backgroundColor = '#f4f4f4';
            document.body.style.backgroundColor = '#f4f4f4';
            document.body.style.color = '#131417';
          } else {
            document.documentElement.style.backgroundColor = '#131417';
            document.body.style.backgroundColor = '#131417';
            document.body.style.color = '#ffffff';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
